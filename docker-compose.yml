version: "3.8"

services:
  backend:
    build: ./backend
    container_name: climbing-wall-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./photos:/app/photos
    environment:
      - DATABASE_URL=sqlite:////app/data/climbing_wall.db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: climbing-wall-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
