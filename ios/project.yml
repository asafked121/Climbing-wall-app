name: ClimbingWallApp
options:
  bundleIdPrefix: com.university
targets:
  ClimbingWallApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ClimbingWallApp.swift
      - path: Extensions
      - path: Models
      - path: Networking
      - path: ViewModels
      - path: Views
      - path: Assets.xcassets
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: 5.0
        PRODUCT_BUNDLE_IDENTIFIER: com.university.ClimbingWallApp
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
